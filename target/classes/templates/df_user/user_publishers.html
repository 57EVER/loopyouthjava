<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<body>
<th:block layout:fragment="center_body">
<div class="main_con">
  <div class="left_menu_con">
    <div class="uc-profile">
      <a class="uc-profile-ring" th:href="@{/user/myself_information/}">
        <img th:src="@{/media/{logo}(logo=${user.ulogo})}" alt="avatar">
      </a>
      <span class="uc-profile-name" th:text="${user.uname}">用户名</span>
      <span class="uc-profile-label">Member</span>
    </div>
    <nav>
      <div class="uc-nav-section">账户</div>
      <ul>
        <li><a th:href="@{/user/info/}">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>个人信息
        </a></li>
        <li><a th:href="@{/user/changeInformation/}">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>修改资料
        </a></li>
        <li><a th:href="@{/user/changeInPwd/}">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>修改密码
        </a></li>
      </ul>
      <div class="uc-nav-section" style="margin-top:8px">交易</div>
      <ul>
        <li><a th:href="@{/user/publishers/}" class="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8M12 3v4"/></svg>发布商品
        </a></li>
        <li><a href="/user/order/1">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>全部订单
        </a></li>
        <li><a th:href="@{/user/site/}">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>收货地址
        </a></li>
      </ul>
    </nav>
  </div>

  <div class="right_content">
    <div class="uc-panel-header">
      <h2>发布商品</h2>
      <p>填写商品信息，发布到平台供其他用户购买</p>
    </div>
    <div class="uc-panel-body">
      <form th:action="@{/user/publishers/}" method="post" enctype="multipart/form-data" class="uc-form">
        <div class="uc-form-row">
          <label>商品名称</label>
          <input type="text" name="title" placeholder="请输入商品名称">
        </div>
        <div class="uc-form-row">
          <label>商品图片</label>
          <div class="uc-file-input-wrap" style="display:block;position:relative;">
            <div class="uc-file-btn" style="pointer-events:none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              选择商品图片
            </div>
            <input type="file" name="pic" accept="image/*" style="pointer-events:auto;">
          </div>
        </div>
        <div class="uc-form-row">
          <label>价格（元）</label>
          <input type="text" name="price" placeholder="请输入商品价格">
        </div>
        <div class="uc-form-row">
          <label>商品简介</label>
          <input type="text" name="jianjie" placeholder="一句话描述商品">
        </div>
        <div class="uc-form-row">
          <label>库存数量</label>
          <input type="text" name="kucun" placeholder="请输入库存数量">
        </div>
        <div class="uc-form-row">
          <label>详细描述</label>
          <textarea name="content" placeholder="详细描述商品的特点、成色、尺寸等信息..."></textarea>
        </div>
        <div class="uc-form-row">
          <label>商品类型</label>
          <select name="type_id">
            <option th:each="typeinfo : ${typeinfos}" th:value="${typeinfo.id}" th:text="${typeinfo.ttitle}"></option>
          </select>
        </div>
        <button type="submit" class="uc-form-submit">立即发布</button>
      </form>
    </div>
  </div>
</div>
<div th:if="${message}"><script th:inline="javascript">alert(/*[[${message}]]*/ '');</script></div>
</th:block>
</body>
</html>
